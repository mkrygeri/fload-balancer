        SENDER_ID: "3"
        TARGET_IP: "10.100.0.200"
        TARGET_PORT: "2055"
        RATE: "40"
        FLOW_TYPE: "netflow9"

    sender04:
      kind: linux
      image: fload-sender:latest
      mgmt-ipv4: 10.100.0.14
      env:
        SENDER_ID: "4"
        TARGET_IP: "10.100.0.200"
        TARGET_PORT: "2055"
        RATE: "60"
